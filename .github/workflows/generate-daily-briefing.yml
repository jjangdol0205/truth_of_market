name: Generate Daily Market Briefing

on:
  # schedule:
  #   - cron: '15 21 * * 1-5'
  workflow_dispatch: # Allows you to manually trigger it from the GitHub UI

jobs:
  run-daily-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Summary Generation API
        run: |
          curl -S -f -L -X GET "https://www.truthofmarket.com/api/cron/daily-summary" \
            -H "Authorization: Bearer ${{ secrets.API_SECRET_KEY }}"

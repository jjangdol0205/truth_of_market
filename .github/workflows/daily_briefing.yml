name: Daily Market Briefing Automation

on:
  schedule:
    # Run at 00:00 UTC every day (which is 09:00 AM KST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggers from the Actions tab

jobs:
  run-daily-briefing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install dotenv @supabase/supabase-js @google/generative-ai

    - name: Run Daily Briefing Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      run: node daily_briefing.mjs
